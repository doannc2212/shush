name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create GitHub Releases

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run --bun lint

      - name: Type-check
        run: bun run --bun type-check

      - name: Production build
        run: bun run --bun build

      - name: Package extension
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          zip -r "shush-${VERSION}.zip" dist/
          echo "ZIP_NAME=shush-${VERSION}.zip" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true

      # ─── Optional: publish to Chrome Web Store ──────────────────────────────
      # Uncomment and configure secrets to enable automatic CWS publishing.
